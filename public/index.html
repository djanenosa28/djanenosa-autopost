<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djanenosa Post — Auto-Poster Discord Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="lp-wrap">
        <!-- Brand -->
        <div class="lp-brand">
            <div class="brand-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.001.022.01.043.027.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.021-.04.001-.088-.041-.104a13.201 13.201 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            </div>
            <span class="lp-brand-name">Djanenosa <b>Post</b></span>
        </div>

        <!-- Tagline -->
        <p class="lp-tagline">Platform Auto-Poster Discord Premium 🚀</p>

        <!-- Auth Card -->
        <div class="auth-card glass lp-card">
            <div class="tab-switcher">
                <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" data-tab="register" onclick="switchTab('register')">Sign Up</button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="field-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="field-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <div id="loginError" class="form-error" style="display:none"></div>
                <button type="submit" class="btn-primary full-width" style="margin-top:.5rem">Sign In →</button>
            </form>

            <form id="registerForm" class="auth-form">
                <div class="field-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required>
                </div>
                <div class="field-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" required>
                </div>
                <div class="field-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Min. 6 characters" required>
                </div>
                <div id="regError" class="form-error" style="display:none"></div>
                <div id="regSuccess" class="form-success" style="display:none"></div>
                <button type="submit" class="btn-primary full-width" style="margin-top:.5rem">Create Account →</button>
            </form>
        </div>

        <!-- Footer -->
        <p class="lp-footer-txt">© 2026 Djanenosa Post. All rights reserved.</p>
    </div>

    <script>
        fetch('/api/auth/me').then(r => { if (r.ok) window.location = '/dashboard'; }).catch(()=>{});

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.toggle('active', f.id === tab + 'Form'));
        }

        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('[type=submit]');
            btn.textContent = 'Signing in...'; btn.disabled = true;
            const err = document.getElementById('loginError');
            err.style.display = 'none';
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const d = await r.json();
                if (d.success) { window.location = '/dashboard'; return; }
                err.textContent = d.error || 'Login gagal.';
                err.style.display = 'block';
            } catch (ex) {
                err.textContent = 'Server tidak bisa dihubungi. Pastikan server sedang berjalan.';
                err.style.display = 'block';
            }
            btn.textContent = 'Sign In →'; btn.disabled = false;
        });

        document.getElementById('registerForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = e.target.querySelector('[type=submit]');
            btn.textContent = 'Creating account...'; btn.disabled = true;
            const err = document.getElementById('regError'), succ = document.getElementById('regSuccess');
            err.style.display = 'none'; succ.style.display = 'none';
            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('regUsername').value,
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPassword').value
                    })
                });
                const d = await r.json();
                if (d.success) { window.location = '/dashboard'; return; }
                err.textContent = d.error || 'Registrasi gagal.';
                err.style.display = 'block';
            } catch (ex) {
                err.textContent = 'Server tidak bisa dihubungi. Pastikan server sedang berjalan.';
                err.style.display = 'block';
            }
            btn.textContent = 'Create Account →'; btn.disabled = false;
        });
    </script>
</body>
</html>
